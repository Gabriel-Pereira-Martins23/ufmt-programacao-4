<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - KIMETSU_ZONE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="banner-topo" style="height:200px;">
    <h1>KIMETSU_ZONE</h1>
    <p>Acesse para consultar a enciclopédia</p>
</header>

<div class="container" style="max-width:420px;">
    <h2 id="form-titulo">Entrar</h2>

    <form id="form-auth" class="form-auth">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" required autocomplete="username">

        <label for="password">Senha</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">

        <p id="mensagem-erro" class="mensagem-erro" hidden></p>

        <button type="submit" id="btn-submit">Entrar</button>
    </form>

    <p class="alternar-modo">
        Ainda não tem conta?
        <a href="#" id="link-alternar">Criar uma conta</a>
    </p>

    <p class="dica-admin">
        Dica: após rodar <code>npm run seed</code> no back-end, use
        <code>admin</code> / <code>demonslayer123</code> para entrar.
    </p>
</div>

<footer class="footer">
    <p>&copy; 2026 KIMETSU_ZONE - Criado por um fã de Demon Slayer</p>
</footer>

<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
